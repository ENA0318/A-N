<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A:N</title>
    <link rel="icon" href="images/logo-simbol.png">
    <style>
        html{ scroll-behavior: smooth;}
        *{margin: 0; padding: 0; box-sizing: border-box; list-style: none;}
        a{ text-decoration: none; color: #222;}
        @font-face{ font-family: GowunDodum;  src: url(../font/Gowun_Dodum/GowunDodum-Regular.ttf);}
        @font-face{ font-family: GmarketSans;  
            src: url(../font/GmarketSans/GmarketSansBold.otf);
            font-weight: 700;}
        @font-face{ font-family: GmarketSans;  
            src: url(../font/GmarketSans/GmarketSansMedium.otf);
            font-weight: 500;}
        @font-face{ font-family: GmarketSans;  
            src: url(../font/GmarketSans/GmarketSansLight.otf);
            font-weight: 300;}
        p{ font-size: 1.56rem; font-family: "GowunDodum",'Noto Sans KR', 'Inter';}
        h1, h2{ font-family: "GmarketSans",'Noto Sans KR', 'Inter';}

header{ }
.site-wrap{ width: 100%; height: 80px; padding: 20px 55px; display: flex; align-items: center; justify-content: space-between; position: relative;}
.top-logo{ width: 120px;}
.site-nav{ width: 100%; height: 80px; display: flex; flex: 1;justify-content: space-between; align-items: center; }
.nav-left{ position: absolute; left: 50%; transform: translateX(-50%); font-family: "GmarketSans",'Noto Sans KR', 'Inter'; font-weight: 500;}
.nav-left ul{ width: 80%;  margin: auto; display: flex; justify-content: center; }
.nav-left ul li{ display: inline-block; height: 20px; 
    /* background: red; */}
.nav-left ul li a{ display: block; height: 20px; line-height: 20px; padding: 0 40px; font-size: 1.5rem;}
.nav-left ul li a:hover{ color: #b74750; text-shadow: 0 0 4px #9240473b;}

.nav-right{ margin-left: auto; }
.nav-right > ul{ display: flex; align-items: center; position: relative;
    width: 100%; /* background: pink; */}
.nav-right ul li{ position: relative;}
.nav-right > ul > li > a{ display: block; height: 80px; line-height: 80px; padding: 0 16px; font-size: 0.9rem;}
.submenu {  display: none; position: absolute; background: #fff; z-index: 999;}
.nav-right .submenu a{ display: block; padding: 6px 23px; text-align: center; /* background: yellow; */ border-bottom: 2px solid #e0d1aa;}
.nav-right .submenu li:last-child a{ border-bottom: none;}
.nav-right ul li:hover .submenu{ display: block;}
.nav-right .submenu a:hover{ background: #642a2f; color: #fff; border-color: transparent;}

/* ---------------------------------------------- */
.banner img{ width: 100%; position: relative; border-radius: 0 0 180px 180px;}
.banner .title-sub{ position: absolute; top: 260px; right: 270px; font-size: 2.8rem; color: #e0d1aa; text-shadow: 2px 2px 6px rgba(0,0,0,0.6);}
.title2{ position: absolute; right: -100px; padding-top: 20px;}

.main-logo{ padding: 80px 0 200px;}

</style>
</head>
<body>
    <header>
        <div class="site-wrap">
            <img class="top-logo" src="images/logo-mini.png" alt="">
            <div class="site-nav">
                <div class="nav-left">
                    <ul>
                        <li><a href="">About</a></li>
                        <li><a href="">Rooms</a></li>
                        <li><a href="">Booking</a></li>
                        <li><a href="">Notice</a></li>
                    </ul>
                </div>
                <div class="nav-right">
                    <ul>
                        <li><a href="#">LOGIN</a></li>
                        <li><a href="#">MY BOOKING</a></li>
                        <li><a href="#">KO <img src="images/icon5.png" alt=""></a>
                            <ul class="submenu">
                                <li><a href="#">KO</a></li>
                                <li><a href="#">EN</a></li>
                                <li><a href="#">CH</a></li>
                                <li><a href="#">JA</a></li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </header>
    <section class="banner">
        <img src="images/main_banner.png" alt="">
        <div class="title-sub">
            <h1 class="title1">A place between</h1>
            <h1 class="title2">arrival and now.</h1>
        </div>
        <div class="main-logo">
            <img src="images/logo-main.png" alt="">
        </div>
    </section>    
</body>
</html>
